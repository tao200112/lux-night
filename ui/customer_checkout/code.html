<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Customer Checkout - Lux Night</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:ital,wght@0,100..900;1,100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#c8981e",
                        "primary-hover": "#b0851a",
                        "background-light": "#f5f5f5",
                        "background-dark": "#1a1a1a",
                        "surface-dark": "#2c2c2c",
                        "surface-light": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["Epilogue", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hide for cleaner UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-gray-900 dark:text-white selection:bg-primary selection:text-white">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto shadow-2xl overflow-hidden bg-background-light dark:bg-background-dark">
<!-- Header -->
<header class="flex items-center px-6 py-5 justify-between sticky top-0 z-10 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md border-b border-gray-200 dark:border-white/5">
<button aria-label="Go back" class="flex size-10 items-center justify-center rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-gray-900 dark:text-white" style="font-size: 24px;">arrow_back_ios_new</span>
</button>
<h2 class="text-gray-900 dark:text-white text-lg font-bold tracking-tight">Checkout</h2>
<div class="size-10"></div> <!-- Spacer for visual balance -->
</header>
<!-- Scrollable Content -->
<main class="flex-1 px-6 pt-6 pb-32 flex flex-col gap-6">
<!-- Hero Event Info -->
<div class="flex items-center gap-4 mb-2">
<div class="h-16 w-16 shrink-0 rounded-lg bg-cover bg-center shadow-md ring-1 ring-white/10" data-alt="Abstract blurry nightlife lights in gold and black" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCkC_SE38BJVyuvn9EuRORe-LOySyuclLg5jvWh02oPrmR2Sy1GenFhJUzgFMwlYPSuDuUesaMnnz0jUdWUUz1HsQWC0K5SRwJEwkIZhAvU04-rdJeu1ZlR4Lz3Gyfkzi40uYvjyh6FOilM55CnMOxwNM3glTGnjlViH42M9hcTEivTWhEDj8WzR2qFu_LNNxvpu8e-blbVtqTQhgktMfbnmE9g1LsttYZ1CR4HvcYyNzgStcvfEHigK9aA_yXaCwsyzRZAWHfN6Zx0');">
</div>
<div class="flex flex-col">
<h3 class="text-xl font-bold text-gray-900 dark:text-white leading-tight">Midnight Gala</h3>
<p class="text-sm text-gray-500 dark:text-gray-400">Saturday, Oct 24 • 10:00 PM</p>
<div class="flex items-center gap-1 mt-1">
<span class="material-symbols-outlined text-primary" style="font-size: 14px;">location_on</span>
<p class="text-xs font-medium text-primary">The Onyx Room</p>
</div>
</div>
</div>
<!-- Order Summary Card -->
<div class="bg-surface-light dark:bg-surface-dark rounded-xl p-6 shadow-sm border border-gray-100 dark:border-white/5 relative overflow-hidden group">
<!-- Decorative top border -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary to-transparent opacity-50"></div>
<h4 class="text-xs font-bold uppercase tracking-wider text-gray-400 dark:text-gray-500 mb-4">Order Summary</h4>
<!-- Item 1 -->
<div class="flex items-start justify-between gap-4 mb-4">
<div>
<p class="text-gray-900 dark:text-white font-medium text-base">General Admission</p>
<p class="text-gray-500 dark:text-gray-400 text-sm">Quantity: 2</p>
</div>
<p class="text-gray-900 dark:text-white font-medium">$100.00</p>
</div>
<!-- Divider -->
<div class="h-px w-full bg-gray-200 dark:bg-white/10 my-4"></div>
<!-- Breakdown -->
<div class="space-y-2">
<div class="flex justify-between text-sm">
<span class="text-gray-500 dark:text-gray-400">Subtotal</span>
<span class="text-gray-900 dark:text-white">$100.00</span>
</div>
<div class="flex justify-between text-sm">
<span class="text-gray-500 dark:text-gray-400">Service Fee</span>
<span class="text-gray-900 dark:text-white">$10.00</span>
</div>
<div class="flex justify-between text-sm">
<span class="text-gray-500 dark:text-gray-400">Taxes</span>
<span class="text-gray-900 dark:text-white">$5.00</span>
</div>
</div>
<!-- Total Display (Inside card for unified look) -->
<div class="mt-6 pt-4 border-t border-dashed border-gray-300 dark:border-white/20 flex items-end justify-between">
<span class="text-sm font-medium text-gray-500 dark:text-gray-400 pb-1">Total Amount</span>
<span class="text-3xl font-bold text-primary tracking-tight">$115.00</span>
</div>
</div>
<!-- Payment Method Preview (Optional but adds context) -->
<div class="bg-surface-light dark:bg-surface-dark rounded-xl p-4 flex items-center justify-between border border-gray-100 dark:border-white/5 cursor-pointer hover:bg-gray-50 dark:hover:bg-white/5 transition-colors">
<div class="flex items-center gap-3">
<div class="bg-gray-100 dark:bg-white/10 p-2 rounded text-gray-900 dark:text-white">
<span class="material-symbols-outlined">credit_card</span>
</div>
<div class="flex flex-col">
<span class="text-sm font-medium text-gray-900 dark:text-white">Apple Pay</span>
<span class="text-xs text-gray-500 dark:text-gray-400">Ending in 4242</span>
</div>
</div>
<span class="text-xs font-bold text-primary uppercase tracking-wide">Change</span>
</div>
<!-- Agreement -->
<div class="px-2">
<label class="flex gap-x-3 items-start cursor-pointer group/check">
<div class="relative flex items-center mt-0.5">
<input class="peer h-5 w-5 appearance-none rounded border-2 border-gray-400 dark:border-gray-600 bg-transparent checked:bg-primary checked:border-primary focus:ring-0 focus:ring-offset-0 transition-all duration-200" type="checkbox"/>
<span class="material-symbols-outlined absolute text-white opacity-0 peer-checked:opacity-100 pointer-events-none left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2" style="font-size: 16px;">check</span>
</div>
<p class="text-sm text-gray-600 dark:text-gray-400 font-normal leading-snug">
                        I agree to the <a class="text-primary hover:underline font-medium" href="#">Terms of Service</a> and acknowledge the non-refundable <a class="text-primary hover:underline font-medium" href="#">Refund Policy</a>.
                    </p>
</label>
</div>
</main>
<!-- Sticky Footer Action -->
<div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-6 bg-gradient-to-t from-background-light via-background-light to-transparent dark:from-background-dark dark:via-background-dark dark:to-transparent z-20 pb-8">
<button class="w-full bg-primary hover:bg-primary-hover active:scale-[0.98] transition-all duration-200 text-white font-bold text-lg h-14 rounded-xl shadow-[0_8px_20px_-6px_rgba(200,152,30,0.5)] flex items-center justify-between px-6 group">
<span>Proceed to Pay</span>
<div class="flex items-center gap-2">
<span class="opacity-90 font-medium">$115.00</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" style="font-size: 20px;">arrow_forward</span>
</div>
</button>
<div class="mt-4 flex items-center justify-center gap-1.5 text-gray-400 dark:text-gray-600">
<span class="material-symbols-outlined" style="font-size: 14px;">lock</span>
<span class="text-[10px] font-medium uppercase tracking-widest">Secure Checkout 256-bit SSL</span>
</div>
</div>
</div>
</body></html>
