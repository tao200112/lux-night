<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Merchant Dashboard - Loading State</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#006666",
                        "background-light": "#ffffff",
                        "background-dark": "#181a1b",
                        "skeleton-base": "#eef2f2",
                        "skeleton-shimmer": "#e0e7e7",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        @keyframes pulse-custom {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-skeleton {
            animation: pulse-custom 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .skeleton-item {
            background-color: #eef2f2;
        }
        .dark .skeleton-item {
            background-color: #2a2d2e;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-[#0c1d1d] transition-colors duration-300">
<!-- iOS Status Bar Spacer -->
<div class="h-12 w-full"></div>
<!-- Top App Bar Skeleton -->
<div class="flex items-center justify-between px-4 py-2">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg skeleton-item animate-skeleton"></div>
<div class="h-6 w-32 rounded skeleton-item animate-skeleton"></div>
</div>
<div class="w-10 h-10 rounded-full skeleton-item animate-skeleton"></div>
</div>
<!-- KPI Metrics Section Skeleton -->
<div class="px-4 pt-6">
<div class="h-7 w-28 rounded skeleton-item animate-skeleton mb-4"></div>
<div class="flex gap-3 overflow-x-hidden">
<div class="flex-1 min-w-[110px] h-32 rounded-xl skeleton-item animate-skeleton p-4 flex flex-col justify-between">
<div class="h-4 w-12 rounded bg-black/5 dark:bg-white/5"></div>
<div>
<div class="h-6 w-16 rounded bg-black/5 dark:bg-white/5 mb-2"></div>
<div class="h-3 w-8 rounded bg-black/5 dark:bg-white/5"></div>
</div>
</div>
<div class="flex-1 min-w-[110px] h-32 rounded-xl skeleton-item animate-skeleton p-4 flex flex-col justify-between">
<div class="h-4 w-12 rounded bg-black/5 dark:bg-white/5"></div>
<div>
<div class="h-6 w-14 rounded bg-black/5 dark:bg-white/5 mb-2"></div>
<div class="h-3 w-10 rounded bg-black/5 dark:bg-white/5"></div>
</div>
</div>
<div class="flex-1 min-w-[110px] h-32 rounded-xl skeleton-item animate-skeleton p-4 flex flex-col justify-between">
<div class="h-4 w-12 rounded bg-black/5 dark:bg-white/5"></div>
<div>
<div class="h-6 w-12 rounded bg-black/5 dark:bg-white/5 mb-2"></div>
<div class="h-3 w-12 rounded bg-black/5 dark:bg-white/5"></div>
</div>
</div>
</div>
</div>
<!-- Charts Section Skeleton -->
<div class="px-4 pt-8">
<div class="flex justify-between items-end mb-4">
<div>
<div class="h-7 w-40 rounded skeleton-item animate-skeleton mb-2"></div>
<div class="h-4 w-24 rounded skeleton-item animate-skeleton"></div>
</div>
<div class="h-8 w-20 rounded-full skeleton-item animate-skeleton"></div>
</div>
<div class="w-full h-48 rounded-xl skeleton-item animate-skeleton relative overflow-hidden flex items-end px-4 pb-8">
<!-- Simulated Chart Path -->
<svg class="absolute inset-0 w-full h-full opacity-10" preserveaspectratio="none" viewbox="0 0 400 200">
<path d="M0 150 Q 50 140 100 100 T 200 80 T 300 120 T 400 40 L 400 200 L 0 200 Z" fill="currentColor"></path>
</svg>
<div class="flex justify-between w-full relative z-10">
<div class="h-2 w-8 rounded bg-black/10 dark:bg-white/10"></div>
<div class="h-2 w-8 rounded bg-black/10 dark:bg-white/10"></div>
<div class="h-2 w-8 rounded bg-black/10 dark:bg-white/10"></div>
<div class="h-2 w-8 rounded bg-black/10 dark:bg-white/10"></div>
<div class="h-2 w-8 rounded bg-black/10 dark:bg-white/10"></div>
</div>
</div>
</div>
<!-- Tonight's Events List Skeleton -->
<div class="px-4 pt-8 pb-24">
<div class="h-7 w-44 rounded skeleton-item animate-skeleton mb-5"></div>
<div class="space-y-4">
<!-- Event Item 1 -->
<div class="flex items-center gap-4 p-3 border border-gray-100 dark:border-gray-800 rounded-xl">
<div class="w-14 h-14 rounded-lg skeleton-item animate-skeleton shrink-0"></div>
<div class="flex-1 space-y-2">
<div class="h-4 w-3/4 rounded skeleton-item animate-skeleton"></div>
<div class="h-3 w-1/2 rounded skeleton-item animate-skeleton"></div>
</div>
<div class="w-8 h-8 rounded-full skeleton-item animate-skeleton shrink-0"></div>
</div>
<!-- Event Item 2 -->
<div class="flex items-center gap-4 p-3 border border-gray-100 dark:border-gray-800 rounded-xl">
<div class="w-14 h-14 rounded-lg skeleton-item animate-skeleton shrink-0"></div>
<div class="flex-1 space-y-2">
<div class="h-4 w-2/3 rounded skeleton-item animate-skeleton"></div>
<div class="h-3 w-1/3 rounded skeleton-item animate-skeleton"></div>
</div>
<div class="w-8 h-8 rounded-full skeleton-item animate-skeleton shrink-0"></div>
</div>
<!-- Event Item 3 -->
<div class="flex items-center gap-4 p-3 border border-gray-100 dark:border-gray-800 rounded-xl">
<div class="w-14 h-14 rounded-lg skeleton-item animate-skeleton shrink-0"></div>
<div class="flex-1 space-y-2">
<div class="h-4 w-5/6 rounded skeleton-item animate-skeleton"></div>
<div class="h-3 w-1/4 rounded skeleton-item animate-skeleton"></div>
</div>
<div class="w-8 h-8 rounded-full skeleton-item animate-skeleton shrink-0"></div>
</div>
</div>
</div>
<!-- Bottom Navigation Bar (Fixed) -->
<div class="fixed bottom-0 left-0 right-0 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-lg border-t border-gray-100 dark:border-gray-800 px-6 pb-8 pt-3">
<div class="flex justify-between items-center max-w-md mx-auto">
<div class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined fill-1">dashboard</span>
<span class="text-[10px] font-bold">Dashboard</span>
</div>
<div class="flex flex-col items-center gap-1 text-gray-400">
<span class="material-symbols-outlined">confirmation_number</span>
<span class="text-[10px] font-medium">Tickets</span>
</div>
<div class="flex flex-col items-center gap-1 text-gray-400">
<span class="material-symbols-outlined">groups</span>
<span class="text-[10px] font-medium">Staff</span>
</div>
<div class="flex flex-col items-center gap-1 text-gray-400">
<span class="material-symbols-outlined">analytics</span>
<span class="text-[10px] font-medium">Reports</span>
</div>
<div class="flex flex-col items-center gap-1 text-gray-400">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-medium">Settings</span>
</div>
</div>
</div>
<!-- Home Indicator -->
<div class="fixed bottom-1 left-1/2 -translate-x-1/2 w-32 h-1 bg-black/20 dark:bg-white/20 rounded-full"></div>
</body></html>
