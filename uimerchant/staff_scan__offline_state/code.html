<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Staff Scan: Offline State</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#006666",
                        "background-light": "#fafaf9",
                        "background-dark": "#18181b",
                        "status-amber": "#FFBF00",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Lexend', sans-serif;
        }
        .scanner-corner {
            width: 40px;
            height: 40px;
            border-color: #006666;
            position: absolute;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-[#0c1d1d] dark:text-white font-display overflow-hidden">
<!-- Offline Banner -->
<div class="bg-status-amber w-full py-2.5 px-4 flex items-center justify-center sticky top-0 z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-black text-[18px]">cloud_off</span>
<p class="text-black text-xs font-bold uppercase tracking-wider">Offline – scans will sync when online</p>
</div>
</div>
<!-- Top App Bar -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 justify-between border-b border-gray-200 dark:border-zinc-800">
<div class="text-primary flex size-10 shrink-0 items-center justify-center rounded-full bg-primary/10">
<span class="material-symbols-outlined">close</span>
</div>
<h2 class="text-lg font-bold leading-tight tracking-tight flex-1 text-center">Scan Tickets</h2>
<div class="flex w-10 items-center justify-end">
<button class="text-primary">
<span class="material-symbols-outlined">help_outline</span>
</button>
</div>
</div>
<!-- Main Content Area -->
<div class="relative flex flex-col items-center justify-start h-[calc(100vh-120px)] p-6 pt-10">
<!-- Headline -->
<div class="mb-8 text-center">
<h3 class="text-2xl font-bold leading-tight mb-2">Ready to Scan</h3>
<p class="text-gray-500 dark:text-zinc-400 text-sm">Align the QR code within the frame below</p>
</div>
<!-- Camera Viewfinder Placeholder -->
<div class="relative w-full aspect-square max-w-[320px] rounded-3xl overflow-hidden shadow-2xl bg-black group">
<!-- Simulated Camera Feed -->
<div class="absolute inset-0 bg-neutral-900 flex items-center justify-center">
<div class="absolute inset-0 opacity-40 bg-[url('https://images.unsplash.com/photo-1514525253361-bee243870d02?auto=format&amp;fit=crop&amp;q=80&amp;w=800')] bg-cover bg-center" data-alt="Abstract dark club background with neon lights"></div>
<!-- Scanning Frame Corners -->
<div class="absolute top-8 left-8 scanner-corner border-t-4 border-l-4 rounded-tl-xl"></div>
<div class="absolute top-8 right-8 scanner-corner border-t-4 border-r-4 rounded-tr-xl"></div>
<div class="absolute bottom-8 left-8 scanner-corner border-b-4 border-l-4 rounded-bl-xl"></div>
<div class="absolute bottom-8 right-8 scanner-corner border-b-4 border-r-4 rounded-br-xl"></div>
<!-- Laser Line Simulation -->
<div class="w-[70%] h-0.5 bg-primary/50 shadow-[0_0_15px_#006666] absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>
</div>
<!-- Sync Indicator Overlay -->
<div class="absolute top-4 left-1/2 -translate-x-1/2 bg-black/60 backdrop-blur-md border border-white/10 px-4 py-2 rounded-full flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm animate-pulse">sync</span>
<p class="text-white text-[11px] font-bold tracking-wide uppercase">Syncing... 3 pending</p>
</div>
</div>
<!-- Camera Controls -->
<div class="mt-8 flex items-center justify-center gap-8">
<button class="flex shrink-0 items-center justify-center rounded-full size-12 bg-white/10 dark:bg-white/5 border border-black/5 dark:border-white/10 text-primary hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined">image</span>
</button>
<button class="flex shrink-0 items-center justify-center rounded-full size-20 bg-primary text-white shadow-lg shadow-primary/30 ring-4 ring-primary/20">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1">camera</span>
</button>
<button class="flex shrink-0 items-center justify-center rounded-full size-12 bg-white/10 dark:bg-white/5 border border-black/5 dark:border-white/10 text-primary hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">flashlight_on</span>
</button>
</div>
<!-- Progress/Sync Bar -->
<div class="w-full max-w-[320px] mt-10">
<div class="bg-primary/5 dark:bg-primary/10 rounded-xl p-4 border border-primary/20">
<div class="flex justify-between items-center mb-2">
<p class="text-xs font-bold text-primary uppercase">Local Storage Queue</p>
<p class="text-xs font-medium text-primary">66%</p>
</div>
<div class="h-1.5 w-full bg-primary/10 rounded-full overflow-hidden">
<div class="h-full bg-primary w-2/3 rounded-full"></div>
</div>
<p class="mt-2 text-[10px] text-gray-500 dark:text-zinc-400 italic">Data is safely stored. Will push to server automatically.</p>
</div>
</div>
</div>
<!-- Bottom Action Panel (iOS Style) -->
<div class="fixed bottom-0 left-0 right-0 bg-white/80 dark:bg-zinc-900/80 backdrop-blur-xl border-t border-gray-200 dark:border-zinc-800 pb-8 pt-4 px-6">
<div class="flex items-center justify-between gap-4 max-w-md mx-auto">
<div class="flex-1">
<p class="text-sm font-bold text-[#0c1d1d] dark:text-white">Manual Check-in</p>
<p class="text-xs text-gray-500">Search by name or code</p>
</div>
<button class="bg-primary text-white px-5 py-2.5 rounded-lg text-sm font-bold flex items-center gap-2">
                Search
                <span class="material-symbols-outlined text-sm">search</span>
</button>
</div>
</div>
</body></html>
