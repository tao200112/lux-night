name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Install, lint, type-check, and build
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: example-anon-key
      SUPABASE_SERVICE_ROLE_KEY: example-service-role-key
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: stripe_publishable_key_placeholder
      STRIPE_SECRET_KEY: stripe_secret_key_placeholder
      STRIPE_WEBHOOK_SECRET: stripe_webhook_secret_placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check if available
        shell: bash
        run: |
          if pnpm -r --if-present type-check; then
            echo "type-check scripts completed"
          else
            echo "No type-check scripts were available or type-check failed"
            exit 1
          fi

      - name: Build
        run: pnpm build
