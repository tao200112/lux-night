name: Christiansburg Housing Digest

on:
  workflow_dispatch:
  schedule:
    - cron: "15 13 * * *"

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Send housing digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GMAIL_SMTP_USER: ${{ secrets.GMAIL_SMTP_USER }}
          GMAIL_SMTP_APP_PASSWORD: ${{ secrets.GMAIL_SMTP_APP_PASSWORD }}
          HOUSING_RECIPIENTS: ridiculouschickenblacksburg@gmail.com
          OPENAI_MODEL: gpt-5
        run: python scripts/christiansburg_housing_digest.py
